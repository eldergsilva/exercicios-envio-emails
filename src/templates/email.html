<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter</title>
    <link rel="stylesheet" href="email.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📬 Newsletter</h1>
            <p>Fique por dentro das novidades</p>
        </div>

        <div class="body">
            <p class="greeting">Olá, <span>{{nome}}</span>! 👋</p>
            <p class="content">{{conteudo}}</p>
            <hr class="divider">
        </div>

        <div class="footer">
            <p>Você está recebendo este e-mail porque se cadastrou na nossa Newsletter.</p>
        </div>
    </div>
</body>
</html>
